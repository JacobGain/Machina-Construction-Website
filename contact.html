  <header>

      <a href="index.html" class="logo-img">
        <img src="./images/Machina-Logo.png" alt="Machina Construction Logo" />

      </ul>
    </nav>
  </header>
  <main id="main">
    <h1>Contact Us</h1>
    <form action="#" method="post" enctype="multipart/form-data">
      <div>
        <label for="name">Name:</label>
        <input type="text" id="name" name="name" required />
      </div>
      <div>
        <label for="email">Email:</label>
        <input type="email" id="email" name="email" required />
      </div>
      <div>
        <label for="message">Message:</label>
        <textarea id="message" name="message" rows="5" required></textarea>
      </div>
      <div>
        <label for="file">Attach File (optional):</label>
        <input type="file" id="file" name="file" />
      </div>
      <!-- Honeypot field for spam prevention (hidden via CSS) -->
      <div class="hp-field" aria-hidden="true" hidden="true">
        <label for="website">Leave this field blank:</label>
        <input type="text" id="website" name="website" tabindex="-1" autocomplete="off" />
      </div>
      <button type="submit">Send Message</button>
    </form>
  </main>
  <footer>
    <p><strong>Machina Construction Ltd.</strong></p>
    <p>201 Spinnaker Way - Unit 11, Concorn, ON</p>
